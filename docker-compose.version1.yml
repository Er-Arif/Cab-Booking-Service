version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: madhupur_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-madhupur_rides}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seeds/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: madhupur_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/madhupur_rides}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-madhupur-rides-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-madhupur-rides-clients}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-30}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-14}
      ADMIN_WEB_ORIGIN: ${ADMIN_WEB_ORIGIN:-http://localhost:3000}
      OTP_PROVIDER: ${OTP_PROVIDER:-mock}
      MAPS_PROVIDER: ${MAPS_PROVIDER:-mock}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-mock}
      FILE_STORAGE_PROVIDER: ${FILE_STORAGE_PROVIDER:-mock}
      MOCK_OTP_CODE: ${MOCK_OTP_CODE:-123456}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-200}
      AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-30}
    ports:
      - "4000:4000"

  admin_web:
    build:
      context: .
      dockerfile: apps/admin_web/Dockerfile
    container_name: madhupur_admin_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
