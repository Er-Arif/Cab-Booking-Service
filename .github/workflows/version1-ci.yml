name: Version 1 CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-and-admin:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm install

      - name: Backend typecheck
        run: npm --workspace apps/backend run typecheck

      - name: Backend tests
        run: npm --workspace apps/backend test

      - name: Admin production build
        run: npm --workspace apps/admin_web run build

  flutter-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Customer Flutter tests
        working-directory: apps/customer_app
        run: flutter test

      - name: Driver Flutter tests
        working-directory: apps/driver_app
        run: flutter test
